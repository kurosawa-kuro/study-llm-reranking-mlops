<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .label { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 20px; fill: #0f172a; }
      .lifeline { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .actor { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .group { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
      .small { font-size: 18px; }
    </style>
  </defs>

  <text x="60" y="52" class="title">/search のシーケンス</text>

  <rect x="40" y="90" width="120" height="44" class="actor"/><text x="100" y="118" text-anchor="middle" class="label">User</text>
  <rect x="200" y="90" width="160" height="44" class="box"/><text x="280" y="118" text-anchor="middle" class="label">FastAPI route</text>
  <rect x="400" y="90" width="220" height="44" class="box"/><text x="510" y="118" text-anchor="middle" class="label">SearchPropertiesUseCase</text>
  <rect x="680" y="90" width="100" height="44" class="box"/><text x="730" y="118" text-anchor="middle" class="label">Redis</text>
  <rect x="840" y="90" width="170" height="44" class="box"/><text x="925" y="118" text-anchor="middle" class="label">Meili adapter</text>
  <rect x="1060" y="90" width="140" height="44" class="box"/><text x="1130" y="118" text-anchor="middle" class="label">ME5 adapter</text>
  <rect x="1240" y="90" width="130" height="44" class="box"/><text x="1305" y="118" text-anchor="middle" class="label">LGBM adapter</text>

  <line x1="100" y1="134" x2="100" y2="700" class="lifeline"/>
  <line x1="280" y1="134" x2="280" y2="700" class="lifeline"/>
  <line x1="510" y1="134" x2="510" y2="700" class="lifeline"/>
  <line x1="730" y1="134" x2="730" y2="700" class="lifeline"/>
  <line x1="925" y1="134" x2="925" y2="700" class="lifeline"/>
  <line x1="1130" y1="134" x2="1130" y2="700" class="lifeline"/>
  <line x1="1305" y1="134" x2="1305" y2="700" class="lifeline"/>

  <line x1="100" y1="170" x2="280" y2="170" class="arrow"/><text x="190" y="160" text-anchor="middle" class="label small">GET /search</text>
  <line x1="280" y1="210" x2="510" y2="210" class="arrow"/><text x="395" y="200" text-anchor="middle" class="label small">execute(SearchQuery)</text>
  <line x1="510" y1="250" x2="730" y2="250" class="arrow"/><text x="620" y="240" text-anchor="middle" class="label small">get(cache_key)</text>

  <rect x="420" y="280" width="930" height="310" class="group"/>
  <text x="450" y="308" class="label">cache miss の場合</text>

  <line x1="510" y1="340" x2="925" y2="340" class="arrow"/><text x="717" y="330" text-anchor="middle" class="label small">search_candidates(query)</text>
  <line x1="925" y1="380" x2="510" y2="380" class="return"/><text x="717" y="370" text-anchor="middle" class="label small">candidates</text>

  <line x1="510" y1="430" x2="1130" y2="430" class="arrow"/><text x="820" y="420" text-anchor="middle" class="label small">embed_query(q)</text>
  <line x1="1130" y1="470" x2="510" y2="470" class="return"/><text x="820" y="460" text-anchor="middle" class="label small">query_vector</text>

  <line x1="510" y1="520" x2="1305" y2="520" class="arrow"/><text x="907" y="510" text-anchor="middle" class="label small">rerank(query, candidates, query_vector)</text>
  <line x1="1305" y1="560" x2="510" y2="560" class="return"/><text x="907" y="550" text-anchor="middle" class="label small">reranked items</text>

  <line x1="510" y1="610" x2="730" y2="610" class="arrow"/><text x="620" y="600" text-anchor="middle" class="label small">set(cache_key, response)</text>
  <line x1="510" y1="660" x2="280" y2="660" class="return"/><text x="395" y="650" text-anchor="middle" class="label small">response</text>
  <line x1="280" y1="700" x2="100" y2="700" class="return"/><text x="190" y="690" text-anchor="middle" class="label small">JSON response</text>
</svg>
