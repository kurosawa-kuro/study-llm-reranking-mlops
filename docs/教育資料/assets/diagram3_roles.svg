<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="540" viewBox="0 0 1400 540">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .accent { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; ry: 12; }
      .text { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 24px; fill: #0f172a; }
      .small { font-size: 20px; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="60" y="52" class="title">候補取得と再ランキングの役割分担</text>

  <rect x="60" y="180" width="220" height="80" class="box"/>
  <text x="170" y="215" text-anchor="middle" class="text">検索条件 + q</text>
  <text x="170" y="240" text-anchor="middle" class="text small">ユーザー入力</text>

  <rect x="350" y="180" width="220" height="80" class="accent"/>
  <text x="460" y="215" text-anchor="middle" class="text">Meilisearch</text>
  <text x="460" y="240" text-anchor="middle" class="text small">候補取得</text>

  <rect x="640" y="180" width="220" height="80" class="box"/>
  <text x="750" y="215" text-anchor="middle" class="text">候補100件</text>
  <text x="750" y="240" text-anchor="middle" class="text small">candidate set</text>

  <rect x="930" y="180" width="220" height="80" class="accent"/>
  <text x="1040" y="215" text-anchor="middle" class="text">ME5 cosine similarity</text>
  <text x="1040" y="240" text-anchor="middle" class="text small">意味近傍</text>

  <rect x="930" y="350" width="220" height="80" class="accent"/>
  <text x="1040" y="385" text-anchor="middle" class="text">LightGBM</text>
  <text x="1040" y="410" text-anchor="middle" class="text small">最終順位</text>

  <rect x="1220" y="350" width="140" height="80" class="box"/>
  <text x="1290" y="385" text-anchor="middle" class="text">上位20件</text>
  <text x="1290" y="410" text-anchor="middle" class="text small">response</text>

  <rect x="330" y="60" width="260" height="70" class="box"/>
  <text x="460" y="90" text-anchor="middle" class="text small">city / layout / price / pet</text>
  <text x="460" y="115" text-anchor="middle" class="text small">walk_min などの厳密条件</text>

  <rect x="920" y="60" width="240" height="70" class="box"/>
  <text x="1040" y="90" text-anchor="middle" class="text small">description の意味</text>
  <text x="1040" y="115" text-anchor="middle" class="text small">言い換え・曖昧語</text>

  <rect x="780" y="455" width="520" height="70" class="box"/>
  <text x="1040" y="485" text-anchor="middle" class="text small">ctr / fav_rate / inquiry_rate / area / age</text>
  <text x="1040" y="510" text-anchor="middle" class="text small">行動特徴 + 物件属性 + me5_score</text>

  <line x1="280" y1="220" x2="350" y2="220" class="line"/>
  <line x1="570" y1="220" x2="640" y2="220" class="line"/>
  <line x1="860" y1="220" x2="930" y2="220" class="line"/>
  <line x1="1040" y1="260" x2="1040" y2="350" class="line"/>
  <line x1="1150" y1="390" x2="1220" y2="390" class="line"/>
  <line x1="460" y1="130" x2="460" y2="180" class="line"/>
  <line x1="1040" y1="130" x2="1040" y2="180" class="line"/>
  <line x1="1040" y1="455" x2="1040" y2="430" class="line"/>
</svg>
